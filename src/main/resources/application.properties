spring.application.name=gabungyuk
app.auth.token-secret=change-this-secret-in-production
spring.devtools.restart.enabled=false
firebase.service-account.path=synergy-38bc6-firebase-adminsdk-fbsvc-6eb7cae339.json
GOOGLE_APPLICATION_CREDENTIALS=synergy-38bc6-firebase-adminsdk-fbsvc-6eb7cae339.json
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# ngrok
server.forward-headers-strategy=native

# Port
server.port=${PORT:8080}

# # Database - production hosting
# Use APP_TIMEZONE env var if provided, otherwise default to Asia/Jakarta (GMT+7).
app.timezone=${APP_TIMEZONE:Asia/Jakarta}
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${APP_TIMEZONE:Asia/Jakarta}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Database - development local
#spring.datasource.url=jdbc:mysql://localhost:3306/sinergy?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
#spring.datasource.username=root
#spring.datasource.password=root
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#web config
spring.web.resources.static-locations=file:${user.home}/uploads/